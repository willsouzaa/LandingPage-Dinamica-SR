<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>{{nome}} — Feed Collage Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: {{corFundo}};
  }

  /* ── ZONA A: Topo creme ────────────────────────────── */
  .zona-topo {
    position: relative;
    width: 1080px;
    height: 480px;
    background: {{corFundo}};
    display: flex;
    overflow: hidden;
  }

  /* Lado esquerdo: logo + headline */
  .topo-esquerda {
    width: 560px;
    height: 100%;
    padding: 48px 36px 36px 52px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }

  .logo-bloco {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-nome {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: #1A1A1A;
    text-transform: uppercase;
  }

  .logo-divisor {
    width: 40px;
    height: 1px;
    background: {{corPrimaria}};
    margin: 6px 0;
  }

  .logo-construtora {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: #666;
    text-transform: uppercase;
  }

  .headline-bloco {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 24px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 54px;
    line-height: 1.1;
    color: #1A1A1A;
    letter-spacing: -0.01em;
  }

  .headline-highlight {
    font-style: italic;
    color: {{corPrimaria}};
  }

  .badges-bloco {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 5px 14px;
    border: 1px solid {{corPrimaria}};
    border-radius: 2px;
    width: fit-content;
  }

  .badge-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: {{corPrimaria}};
    text-transform: uppercase;
  }

  .localizacao {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }

  .loc-icon {
    width: 8px;
    height: 8px;
    border-radius: 50% 50% 50% 0;
    background: #666;
    transform: rotate(-45deg);
  }

  .loc-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #666;
    text-transform: uppercase;
  }

  /* Lado direito: foto em arco */
  .topo-direita {
    position: absolute;
    right: 0;
    top: 0;
    width: 480px;
    height: 480px;
    overflow: hidden;
  }

  .foto-arco-container {
    position: absolute;
    right: -10px;
    top: 20px;
    width: 420px;
    height: 440px;
    border-radius: 210px 210px 0 0;
    overflow: hidden;
    box-shadow: -12px 0 40px rgba(0,0,0,0.12);
  }

  .foto-arco {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  /* Ornamento decorativo */
  .ornamento-circulo {
    position: absolute;
    right: 400px;
    top: 140px;
    width: 60px;
    height: 60px;
    border: 1px solid {{corPrimaria}};
    border-radius: 50%;
    opacity: 0.3;
  }

  /* ── ZONA B: Colagem central ───────────────────────── */
  .zona-colagem {
    width: 1080px;
    height: 390px;
    display: flex;
    gap: 3px;
    background: #222;
  }

  .colagem-item {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  .colagem-foto {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.75);
    transition: transform 0.3s;
  }

  .colagem-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 40px 20px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
  }

  .colagem-label-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.9);
    text-transform: uppercase;
  }

  .colagem-label-line {
    width: 24px;
    height: 1px;
    background: {{corPrimaria}};
    margin-bottom: 8px;
  }

  /* ── ZONA C: Rodapé escuro ─────────────────────────── */
  .zona-rodape {
    width: 1080px;
    height: 480px;
    background: {{corRodape}};
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 64px;
    gap: 36px;
  }

  .rodape-dados {
    display: flex;
    align-items: center;
    gap: 0;
    width: 100%;
    justify-content: center;
  }

  .dado-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .dado-separador {
    width: 1px;
    height: 48px;
    background: rgba(255,255,255,0.15);
  }

  .dado-valor {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 38px;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .dado-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    text-align: center;
  }

  .rodape-divisor {
    width: 280px;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  .rodape-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 36px;
    background: {{corPrimaria}};
    border-radius: 3px;
  }

  .cta-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
  }

  .rodape-logo-bottom {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- ZONA A: Topo creme -->
  <div class="zona-topo">
    <div class="topo-esquerda">
      <div class="logo-bloco">
        <span class="logo-nome">{{nome}}</span>
        <div class="logo-divisor"></div>
        <span class="logo-construtora">{{construtora}}</span>
      </div>

      <div class="headline-bloco">
        <h1 class="headline">
          {{headline}}<br>
          <span class="headline-highlight">{{headlineHighlight}}</span>
        </h1>
      </div>

      <div class="badges-bloco">
        <div class="badge"><span class="badge-text">{{badge1}}</span></div>
        <div class="localizacao">
          <div class="loc-icon"></div>
          <span class="loc-text">{{localizacao}}</span>
        </div>
      </div>
    </div>

    <div class="topo-direita">
      <div class="foto-arco-container">
        <img class="foto-arco" src="{{imagemPrincipalUrl}}" alt="{{nome}}">
      </div>
    </div>

    <div class="ornamento-circulo"></div>
  </div>

  <!-- ZONA B: Colagem -->
  <div class="zona-colagem">
    <div class="colagem-item">
      <img class="colagem-foto" src="{{imagemSecundariaUrl}}" alt="{{colagem1Label}}">
      <div class="colagem-label">
        <div class="colagem-label-line"></div>
        <span class="colagem-label-text">{{colagem1Label}}</span>
      </div>
    </div>
    <div class="colagem-item">
      <img class="colagem-foto" src="{{imagemTerciariaUrl}}" alt="{{colagem2Label}}">
      <div class="colagem-label">
        <div class="colagem-label-line"></div>
        <span class="colagem-label-text">{{colagem2Label}}</span>
      </div>
    </div>
  </div>

  <!-- ZONA C: Rodapé escuro -->
  <div class="zona-rodape">
    <div class="rodape-dados">
      <div class="dado-item">
        <span class="dado-valor">{{dado1Valor}}</span>
        <span class="dado-label">{{dado1Label}}</span>
      </div>
      <div class="dado-separador"></div>
      <div class="dado-item">
        <span class="dado-valor">{{dado2Valor}}</span>
        <span class="dado-label">{{dado2Label}}</span>
      </div>
      <div class="dado-separador"></div>
      <div class="dado-item">
        <span class="dado-valor">{{dado3Valor}}</span>
        <span class="dado-label">{{dado3Label}}</span>
      </div>
    </div>

    <div class="rodape-divisor"></div>

    <div class="rodape-cta">
      <span class="cta-text">{{cta}}</span>
    </div>

    <span class="rodape-logo-bottom">{{nome}} · {{construtora}}</span>
  </div>

</body>
</html>
