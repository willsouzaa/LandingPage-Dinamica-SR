<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>{{nome}} — Feed Hero Full</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: {{corFundo}};
    position: relative;
  }

  /* ── Foto de fundo cobrindo tudo ───────────────────── */
  .foto-fundo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: brightness(0.45);
    z-index: 0;
  }

  /* Gradiente sobre a foto para profundidade */
  .gradiente-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(15, 37, 32, 0.6) 0%,
        rgba(15, 37, 32, 0.1) 30%,
        rgba(15, 37, 32, 0.05) 50%,
        rgba(15, 37, 32, 0.7) 75%,
        rgba(15, 37, 32, 0.95) 100%
      );
    z-index: 1;
  }

  /* ── Conteúdo ──────────────────────────────────────── */
  .conteudo {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 52px 64px;
  }

  /* Topo: logo + badge */
  .topo {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .logo-bloco {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-nome {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 0.22em;
    color: #fff;
    text-transform: uppercase;
  }

  .logo-construtora {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.28em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  .badge {
    padding: 6px 16px;
    border: 1px solid {{corPrimaria}};
    border-radius: 2px;
  }

  .badge-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: {{corPrimaria}};
    text-transform: uppercase;
  }

  /* Meio: espaço para a foto aparecer */
  .meio { flex: 1; }

  /* Parte inferior: headline + cards + cta */
  .rodape {
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .headline-bloco {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 64px;
    line-height: 1.05;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .headline-highlight {
    font-style: italic;
    color: {{corPrimaria}};
  }

  /* Cards de dados */
  .cards {
    display: flex;
    gap: 12px;
  }

  .card {
    flex: 1;
    padding: 14px 18px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-valor {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 22px;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .card-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
  }

  /* Localizacao + CTA */
  .cta-bloco {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .localizacao {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .loc-bairro {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .loc-icon {
    font-size: 13px;
    color: {{corPrimaria}};
    line-height: 1;
  }

  .loc-bairro-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #fff;
    text-transform: uppercase;
  }

  .loc-cidade {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    padding-left: 21px;
  }

  .cta-btn {
    padding: 18px 36px;
    background: {{corPrimaria}};
    border-radius: 4px;
  }

  .cta-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Linha decorativa dourada */
  .linha-decorativa {
    position: absolute;
    left: 64px;
    top: 52px;
    bottom: 52px;
    width: 2px;
    background: linear-gradient(to bottom, {{corPrimaria}}, transparent 40%, transparent 60%, {{corPrimaria}});
    opacity: 0.25;
    z-index: 2;
  }
</style>
</head>
<body>

  <img class="foto-fundo" src="{{imagemPrincipalUrl}}" alt="{{nome}}">
  <div class="gradiente-overlay"></div>
  <div class="linha-decorativa"></div>

  <div class="conteudo">
    <!-- Topo -->
    <div class="topo">
      <div class="logo-bloco">
        <span class="logo-nome">{{nome}}</span>
        <span class="logo-construtora">{{construtora}}</span>
      </div>
      <div class="badge">
        <span class="badge-text">{{badge1}}</span>
      </div>
    </div>

    <!-- Meio (espaço para foto aparecer) -->
    <div class="meio"></div>

    <!-- Rodapé com headline, cards e CTA -->
    <div class="rodape">
      <div class="headline-bloco">
        <h1 class="headline">
          {{headline}}<br>
          <span class="headline-highlight">{{headlineHighlight}}</span>
        </h1>
      </div>

      <div class="cards">
        <div class="card">
          <span class="card-valor">{{card1Valor}}</span>
          <span class="card-label">{{card1Label}}</span>
        </div>
        <div class="card">
          <span class="card-valor">{{card2Valor}}</span>
          <span class="card-label">{{card2Label}}</span>
        </div>
        <div class="card">
          <span class="card-valor">{{card3Valor}}</span>
          <span class="card-label">{{card3Label}}</span>
        </div>
      </div>

      <div class="cta-bloco">
        <div class="localizacao">
          <div class="loc-bairro">
            <span class="loc-icon">📍</span>
            <span class="loc-bairro-text">{{localizacao}}</span>
          </div>
          <span class="loc-cidade">{{localizacaoDetalhe}}</span>
        </div>
        <div class="cta-btn">
          <span class="cta-text">{{cta}}</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
