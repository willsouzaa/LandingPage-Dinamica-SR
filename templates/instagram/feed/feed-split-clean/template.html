<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>{{nome}} — Feed Split Clean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: {{corFundo}};
    position: relative;
  }

  /* ── ZONA A: Topo (logo + foto em arco) ────────────── */
  .zona-topo {
    position: relative;
    width: 1080px;
    height: 500px;
    background: {{corFundo}};
  }

  /* Logo topo esquerda */
  .logo-bloco {
    position: absolute;
    top: 52px;
    left: 64px;
    z-index: 3;
  }

  .logo-nome {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 0.2em;
    color: #1A1A1A;
    text-transform: uppercase;
    display: block;
  }

  .logo-linha {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 5px;
  }

  .logo-divisor {
    width: 28px;
    height: 1px;
    background: {{corPrimaria}};
  }

  .logo-construtora {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.24em;
    color: #888;
    text-transform: uppercase;
  }

  /* Foto em arco, topo direito */
  .foto-arco-container {
    position: absolute;
    right: 52px;
    top: 20px;
    width: 430px;
    height: 470px;
    border-radius: 215px 215px 0 0;
    overflow: hidden;
    box-shadow: -8px 12px 48px rgba(0,0,0,0.15);
    z-index: 2;
  }

  .foto-arco {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  /* Linha horizontal decorativa */
  .linha-h {
    position: absolute;
    left: 64px;
    top: 96px;
    width: 380px;
    height: 1px;
    background: linear-gradient(to right, {{corPrimaria}}, transparent);
    opacity: 0.25;
    z-index: 1;
  }

  /* ── ZONA B: Headline central ──────────────────────── */
  .zona-headline {
    position: relative;
    width: 1080px;
    padding: 48px 64px 0;
    z-index: 3;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 100px;
    line-height: 0.95;
    color: #1A1A1A;
    letter-spacing: -0.03em;
  }

  .headline-highlight {
    font-style: italic;
    color: {{corPrimaria}};
  }

  /* Badges e localização */
  .badges-loc {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 28px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 6px 16px;
    border: 1px solid {{corPrimaria}};
    border-radius: 2px;
    width: fit-content;
  }

  .badge-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: {{corPrimaria}};
    text-transform: uppercase;
  }

  .loc-bloco {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .loc-linha1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #1A1A1A;
    text-transform: uppercase;
  }

  .loc-linha2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #888;
    text-transform: uppercase;
  }

  /* ── Foto secundária sobreposta ────────────────────── */
  .foto-secundaria-container {
    position: absolute;
    left: 52px;
    top: 990px;
    width: 200px;
    height: 240px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 8px 8px 32px rgba(0,0,0,0.2);
    z-index: 10;
    border: 4px solid {{corFundo}};
  }

  .foto-secundaria {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ── ZONA C: Dados + CTA ───────────────────────────── */
  .zona-rodape {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 360px;
    padding: 0 64px 52px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 28px;
    z-index: 5;
    background: linear-gradient(to bottom, transparent, {{corFundo}} 35%);
  }

  .dados-bloco {
    display: flex;
    align-items: center;
    padding-left: 224px;
    gap: 0;
  }

  .dado-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .dado-separador {
    width: 1px;
    height: 36px;
    background: rgba(26,26,26,0.15);
    margin: 0 28px;
  }

  .dado-valor {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 28px;
    color: #1A1A1A;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .dado-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #888;
    text-transform: uppercase;
  }

  .cta-bloco {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(26,26,26,0.1);
    padding-top: 20px;
  }

  .cta-nome {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.24em;
    color: #888;
    text-transform: uppercase;
  }

  .cta-btn {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cta-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: {{corPrimaria}};
    text-transform: uppercase;
  }

  .cta-seta {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: {{corPrimaria}};
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-family: 'Montserrat', sans-serif;
  }

  /* Ornamento: esboço cidade/ponte no rodapé */
  .ornamento-skyline {
    position: absolute;
    bottom: 100px;
    right: 64px;
    opacity: 0.04;
    z-index: 1;
  }

  .ornamento-skyline svg {
    width: 320px;
    height: 80px;
  }
</style>
</head>
<body>

  <!-- Linha decorativa horizontal -->
  <div class="linha-h"></div>

  <!-- ZONA A: Topo -->
  <div class="zona-topo">
    <div class="logo-bloco">
      <span class="logo-nome">{{nome}}</span>
      <div class="logo-linha">
        <div class="logo-divisor"></div>
        <span class="logo-construtora">{{construtora}}</span>
      </div>
    </div>

    <div class="foto-arco-container">
      <img class="foto-arco" src="{{imagemPrincipalUrl}}" alt="{{nome}}">
    </div>
  </div>

  <!-- ZONA B: Headline -->
  <div class="zona-headline">
    <h1 class="headline">
      {{headline}}<br>
      <span class="headline-highlight">{{headlineHighlight}}</span>
    </h1>

    <div class="badges-loc">
      <div class="badge">
        <span class="badge-text">{{badge1}}</span>
      </div>
      <div class="loc-bloco">
        <span class="loc-linha1">{{localizacaoLinha1}}</span>
        <span class="loc-linha2">{{localizacaoLinha2}}</span>
      </div>
    </div>
  </div>

  <!-- Foto lifestyle sobreposta -->
  <div class="foto-secundaria-container">
    <img class="foto-secundaria" src="{{imagemSecundariaUrl}}" alt="lifestyle">
  </div>

  <!-- Ornamento skyline -->
  <div class="ornamento-skyline">
    <svg viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 80 L0 50 L20 50 L20 30 L30 30 L30 20 L40 20 L40 30 L50 30 L50 45 L70 45 L70 25 L80 25 L80 15 L90 15 L90 25 L100 25 L100 45 L120 45 L120 35 L130 35 L130 10 L140 10 L140 35 L150 35 L150 45 L170 45 L170 28 L180 28 L180 18 L190 18 L190 28 L200 28 L200 45 L220 45 L220 38 L235 38 L235 55 L250 55 L250 38 L265 38 L265 45 L280 45 L280 55 L300 55 L300 45 L310 45 L310 35 L320 35 L320 80 Z" fill="#1A1A1A"/>
    </svg>
  </div>

  <!-- ZONA C: Dados + CTA -->
  <div class="zona-rodape">
    <div class="dados-bloco">
      <div class="dado-item">
        <span class="dado-valor">{{dado1Valor}}</span>
        <span class="dado-label">{{dado1Label}}</span>
      </div>
      <div class="dado-separador"></div>
      <div class="dado-item">
        <span class="dado-valor">{{dado2Valor}}</span>
        <span class="dado-label">{{dado2Label}}</span>
      </div>
      <div class="dado-separador"></div>
      <div class="dado-item">
        <span class="dado-valor">{{dado3Valor}}</span>
        <span class="dado-label">{{dado3Label}}</span>
      </div>
    </div>

    <div class="cta-bloco">
      <span class="cta-nome">{{nome}} · {{construtora}}</span>
      <div class="cta-btn">
        <span class="cta-text">{{cta}}</span>
        <div class="cta-seta">→</div>
      </div>
    </div>
  </div>

</body>
</html>
